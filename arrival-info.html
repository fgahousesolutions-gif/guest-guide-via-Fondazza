    :root {
      --bg: #eef0f4;
      --card: #f7f7f8;
      --text: #18213c;
      --muted: #6b7890;
      --border: #273454;
      --primary: #0f1b3d;
      --primary-hover: #162754;
      --shadow: 0 8px 24px rgba(15, 27, 61, 0.08);
      --radius-xl: 26px;
      --radius-lg: 20px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 22px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 28px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(32px, 5vw, 52px);
      line-height: 1.08;
      letter-spacing: -0.03em;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 28px;
      letter-spacing: -0.02em;
    }

    h3 {
      margin: 0 0 10px;
      font-size: 20px;
    }

    p {
      margin: 0;
    }

    .subtitle,
    .muted {
      color: var(--muted);
    }

    .subtitle {
      font-size: 18px;
    }

    .space-top {
      margin-top: 14px;
    }

    .button-grid {
      display: grid;
      gap: 14px;
    }

    .lang-grid {
      grid-template-columns: repeat(5, minmax(0, 1fr));
      margin-top: 24px;
    }

    .actions-grid,
    .info-grid,
    .links-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .lang-btn,
    .action-btn,
    .link-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-height: 60px;
      padding: 14px 18px;
      border-radius: 22px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      transition: 0.2s ease;
      cursor: pointer;
    }

    .lang-btn {
      background: transparent;
      color: var(--text);
      border: 2px solid var(--border);
    }

    .lang-btn:hover,
    .lang-btn.active {
      background: #e9edf5;
    }

    .action-btn {
      background: var(--primary);
      color: #fff;
      border: 2px solid var(--border);
    }

    .action-btn:hover {
      background: var(--primary-hover);
    }

    .link-btn {
      background: transparent;
      color: var(--text);
      border: 2px solid var(--border);
    }

    .link-btn:hover {
      background: #e9edf5;
    }

    .stack {
      display: grid;
      gap: 18px;
    }

    .info-grid {
      display: grid;
      gap: 24px;
    }

    .alert-box {
      margin-top: 18px;
      padding: 16px 18px;
      border-radius: var(--radius-lg);
      background: #fff4d6;
      border: 2px solid #d6b14d;
      color: #5f4710;
      font-weight: 600;
    }

    .links-grid {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }

    .info-item .label {
      display: block;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .info-item .value {
      font-size: 17px;
    }

    .tips-list,
    .steps-list {
      margin: 0;
      padding-left: 22px;
    }

    .tips-list li + li,
    .steps-list li + li {
      margin-top: 10px;
    }

    .footer {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      padding: 8px 0 24px;
    }

    @media (max-width: 800px) {
      .actions-grid,
      .info-grid,
      .links-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 700px) {
      .wrap {
        padding: 14px;
      }

      .card {
        padding: 20px;
      }

      .lang-grid {
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 8px;
      }

      .lang-btn {
        min-height: 48px;
        padding: 10px 6px;
        font-size: 12px;
        border-radius: 16px;
      }
    }
  </style>
</head>

    function setText(id, value) {
      const el = document.getElementById(id);
      if (el) el.textContent = value || "";
    }

    function setList(id, items) {
      const list = document.getElementById(id);
      if (!list) return;
      list.innerHTML = "";
      (items || []).forEach((item) => {
        const li = document.createElement("li");
        li.textContent = item;
        list.appendChild(li);
      });
    }

    function render(lang) {
      const t = CONTENT[lang] || CONTENT.it;
      document.title = `${t.pageTitle} - Terrazze di Via Fondazza`;
      document.documentElement.lang = lang;

      setText("page-title", t.pageTitle);
      setText("subtitle-1", t.subtitle1);
      setText("subtitle-2", t.subtitle2);
      setText("map-btn", t.mapBtn);
      setText("whatsapp-btn", t.whatsappBtn);
      setText("arrival-title", t.arrivalTitle);
      setText("address-label", t.addressLabel);
      setText("checkin-label", t.checkinLabel);
      setText("arrival-note", t.arrivalNote);

      setText("airport-title", t.airportTitle);
      setText("airport-option-1-title", t.airportOption1Title);
      setList("airport-option-1-list", t.airportOption1List);
      setText("airport-option-2-title", t.airportOption2Title);
      setList("airport-option-2-list", t.airportOption2List);
      setText("airport-option-3-title", t.airportOption3Title);
      setList("airport-option-3-list", t.airportOption3List);

      setText("station-title", t.stationTitle);
      setText("station-option-1-title", t.stationOption1Title);
      setList("station-option-1-list", t.stationOption1List);
      setText("station-option-2-title", t.stationOption2Title);
      setList("station-option-2-list", t.stationOption2List);

      setText("car-title", t.carTitle);
      setText("car-text", t.carText);
      setText("car-alert", t.carAlert);
      setList("car-list", t.carList);
      setText("garage-map-btn", t.garageMapBtn);
      setText("garage-call-btn", t.garageCallBtn);

      setText("before-arrival-title", t.beforeArrivalTitle);
      setList("before-arrival-list", t.beforeArrivalList);
      setText("links-title", t.linksTitle);
      setText("links-text", t.linksText);
      setText("link-marconi", t.linkMarconi);
      setText("link-marconi-tickets", t.linkMarconiTickets);
      setText("link-tper", t.linkTper);
      setText("link-taxi", t.linkTaxi);
      setText("link-uber", t.linkUber);
      setText("link-bologna", t.linkBologna);
      setText("footer-text", t.footerText);

      document.querySelectorAll(".lang-btn").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.lang === lang);
      });
    }

    document.querySelectorAll(".lang-btn").forEach((btn) => {
      btn.addEventListener("click", () => render(btn.dataset.lang));
    });

    render("it");
  </script>
