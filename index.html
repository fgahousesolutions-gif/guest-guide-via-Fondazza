<html lang="it">
<head>
  <meta charset="UTF-8">

  <title>Terrazze di Via Fondazza - Guest Guide</title>
  <style>
    :root {
      --bg: #eef0f4;
      --card: #f7f7f8;
      --text: #18213c;
      --muted: #6b7890;
      --border: #273454;
      --primary: #0f1b3d;
      --primary-hover: #162754;
      --shadow: 0 8px 24px rgba(15, 27, 61, 0.08);
      --radius-xl: 26px;
      --radius-lg: 20px;
      --radius-md: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 22px;
    }

    .hero,
    .card {
      background: var(--card);
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow: var(--shadow);
      margin-bottom: 22px;
    }

    .hero-media {
      position: relative;
      min-height: 320px;
      background: linear-gradient(135deg, #dfe5f0 0%, #f4f5f7 55%, #e8edf6 100%);
    }

    .hero img {
      width: 100%;
      height: 320px;
      object-fit: cover;
      display: block;
    }

    .hero-fallback {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 18px;
    }

    .hero-content,
    .card {
      padding: 28px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(34px, 5vw, 56px);
      line-height: 1.08;
      letter-spacing: -0.03em;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 28px;
      letter-spacing: -0.02em;
    }

    h3 {
      margin: 0 0 10px;
      font-size: 20px;
    }

    p {
      margin: 0;
    }

    .subtitle {
      color: var(--muted);
      font-size: 18px;
    }

    .space-top {
      margin-top: 18px;
    }

    .button-grid {
      display: grid;
      gap: 14px;
    }

    .lang-grid {
      grid-template-columns: repeat(5, minmax(0, 1fr));
      margin-top: 26px;
    }

    .primary-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-top: 22px;
    }

    .docs-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      margin-top: 14px;
    }

    .lang-btn,
    .action-btn,
    .doc-btn,
    .mini-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-height: 62px;
      padding: 14px 18px;
      border-radius: 22px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      transition: 0.2s ease;
      cursor: pointer;
    }

    .lang-btn,
    .doc-btn,
    .mini-btn {
      background: transparent;
      color: var(--text);
      border: 2px solid var(--border);
    }

    .lang-btn:hover,
    .lang-btn.active,
    .doc-btn:hover,
    .mini-btn:hover {
      background: #e9edf5;
    }

    .action-btn {
      background: var(--primary);
      color: #fff;
      border: 2px solid var(--border);
    }

    .action-btn:hover {
      background: var(--primary-hover);
    }

    .info-grid,
    .useful-grid,
    .suggestions-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 34px;
    }

    .info-stack {
      display: grid;
      gap: 24px;
    }

    .info-item .label,
    .useful-item .label {
      display: block;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .info-item .value,
    .useful-item .value {
      font-size: 17px;
      color: var(--text);
      margin-bottom: 2px;
    }

    .info-item .note,
    .useful-item .note,
    .muted {
      font-size: 14px;
      color: var(--muted);
    }

    .stack {
      display: grid;
      gap: 18px;
    }

    ul {
      margin: 0;
      padding-left: 22px;
    }

    li + li {
      margin-top: 10px;
    }

    .hidden {
      display: none !important;
    }

    .section-intro {
      margin-bottom: 18px;
      color: var(--muted);
    }

    .explore-card {
      text-align: center;
    }

    .explore-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 20px;
    }

    .useful-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .ecosystem-card {
      text-align: center;
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
    }

    .ecosystem-kicker {
      display: inline-block;
      margin-bottom: 10px;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid #fed7aa;
      background: #fff7ed;
      color: #9a3412;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .ecosystem-title {
      margin-bottom: 12px;
    }

    .ecosystem-text {
      max-width: 640px;
      margin: 0 auto 18px;
      color: var(--muted);
      font-size: 16px;
    }

    .ecosystem-actions {
      max-width: 360px;
      margin: 0 auto;
    }

    .accordion-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--text);
      font: inherit;
      text-align: left;
      cursor: pointer;
    }

    .accordion-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .accordion-icon {
      flex: 0 0 auto;
      width: 36px;
      height: 36px;
      border-radius: 999px;
      border: 2px solid var(--border);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      line-height: 1;
      transition: transform 0.2s ease;
    }

    .accordion-panel {
      margin-top: 18px;
    }

    .accordion-panel > h2 {
      display: none;
    }

    .card.collapsed .accordion-panel {
      display: none;
    }

    .card.collapsed .accordion-icon {
      transform: rotate(-90deg);
    }

    @media (max-width: 900px) {
      .docs-grid,
      .info-grid,
      .useful-grid,
      .suggestions-grid,
      .explore-actions {
        grid-template-columns: 1fr;
        gap: 24px;
      }
    }

    @media (max-width: 700px) {
      .wrap {
        padding: 14px;
      }

      .hero img,
      .hero-media {
        min-height: 220px;
        height: 220px;
      }

      .hero-content,
      .card {
        padding: 20px;
      }

      .primary-grid,
      .docs-grid {
        grid-template-columns: 1fr;
      }

      .lang-grid {
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 8px;
      }

      .lang-btn {
        min-height: 48px;
        padding: 10px 6px;
        font-size: 12px;
        border-radius: 16px;
      }

      h2 {
        font-size: 24px;
      }

      .accordion-title {
        font-size: 24px;
      }
    }
  </style>
</head>

    function setText(id, value) {
      const el = document.getElementById(id);
      if (el) el.textContent = value || "";
    }

    function setHtmlList(id, items) {
      const list = document.getElementById(id);
      if (!list) return;
      list.innerHTML = "";
      (items || []).forEach((item) => {
        const li = document.createElement("li");
        li.innerHTML = item;
        list.appendChild(li);
      });
    }

    function setButton(id, label, href) {
      const el = document.getElementById(id);
      if (!el) return false;
      el.textContent = label || "";
      if (href) {
        el.href = href;
        el.classList.remove("hidden");
        return true;
      }
      el.classList.add("hidden");
      return false;
    }

    function getDocumentForLang(docConfig, lang) {
      if (!docConfig) return "";
      if (typeof docConfig === "string") return docConfig;
      return docConfig[lang] || docConfig.fallback || "";
    }

    const ACCORDION_CARDS = [
      { id: "info-card", titleKey: "infoTitle" },
      { id: "access-card", titleKey: "accessTitle" },
      { id: "rules-card", titleKey: "rulesTitle" },
      { id: "waste-card", titleKey: "wasteTitle" },
      { id: "checkout-card", titleKey: "checkoutTitle" },
      { id: "suggestions-card", titleKey: "suggestionsTitle" },
      { id: "groceries-card", titleKey: "groceriesTitle" },
      { id: "useful-card", titleKey: "usefulTitle" },
      { id: "explore-card", titleKey: "exploreTitle" },
      { id: "ecosystem-card", titleKey: "ecosystemTitle" }
    ];

    function initAccordions() {
      ACCORDION_CARDS.forEach(({ id, titleKey }) => {
        const card = document.getElementById(id);
        if (!card || card.querySelector(".accordion-toggle")) return;

        const panel = document.createElement("div");
        panel.className = "accordion-panel";
        while (card.firstChild) panel.appendChild(card.firstChild);

        const button = document.createElement("button");
        button.type = "button";
        button.className = "accordion-toggle";
        button.setAttribute("aria-expanded", "true");
        button.dataset.titleKey = titleKey;
        button.innerHTML = '<span class="accordion-title"></span><span class="accordion-icon" aria-hidden="true">⌄</span>';
        button.addEventListener("click", () => {
          const collapsed = card.classList.toggle("collapsed");
          button.setAttribute("aria-expanded", String(!collapsed));
        });

        card.appendChild(button);
        card.appendChild(panel);
      });
    }

    function updateAccordionTitles(t) {
      document.querySelectorAll(".accordion-toggle").forEach((button) => {
        const title = button.querySelector(".accordion-title");
        if (title) title.textContent = t[button.dataset.titleKey] || "";
      });
    }

    function render(lang) {
      const t = CONTENT[lang] || CONTENT.it;

      document.title = `${PROPERTY.apartmentName} - ${t.pageTitle}`;
      document.documentElement.lang = lang;

      setText("apartment-name", PROPERTY.apartmentName);
      setText("subtitle-1", t.subtitle1);
      setText("subtitle-2", t.subtitle2);

      setText("label-address", t.labelAddress);
      setText("address-value", PROPERTY.address);
      setText("label-checkin", t.labelCheckin);
      setText("checkin-value", PROPERTY.checkin);
      setText("label-checkout", t.labelCheckout);
      setText("checkout-value", PROPERTY.checkout);
      setText("label-wifi", t.labelWifi);
      setText("wifi-name", PROPERTY.wifiName);
      setText("wifi-password", `${t.wifiPasswordLabel}: ${PROPERTY.wifiPassword}`);
      setText("label-contact", t.labelContact);
      setText("contact-value", PROPERTY.whatsappDisplay);
      setText("contact-note", t.contactNote);
      setText("label-parking", t.labelParking);
      setText("parking-short", PROPERTY.parkingShort);

      setText("access-title", t.accessTitle);
      setText("access-text", t.accessText);
      setText("access-note", t.accessNote);

      setText("rules-title", t.rulesTitle);
      setHtmlList("rules-list", t.rulesList);

      setText("waste-title", t.wasteTitle);
      setText("waste-text", t.wasteText);
      setText("waste-note", t.wasteNote);

      setText("checkout-title", t.checkoutTitle);
      setHtmlList("checkout-list", t.checkoutList);

      setText("suggestions-title", t.suggestionsTitle);
      setText("suggestions-note", t.suggestionsNote);
      setText("restaurants-title", t.restaurantsTitle);
      setHtmlList("restaurants-list", t.restaurantsList);
      setText("aperitivo-title", t.aperitivoTitle);
      setHtmlList("aperitivo-list", t.aperitivoList);
      setText("attractions-title", t.attractionsTitle);
      setHtmlList("attractions-list", t.attractionsList);
      setText("groceries-title", t.groceriesTitle);
      setText("groceries-note", t.groceriesNote);
      setHtmlList("groceries-list", t.groceriesList);

      setText("useful-title", t.usefulTitle);
      setText("emergency-title", t.emergencyTitle);
      setText("emergency-112", t.emergency112);
      setText("emergency-118", t.emergency118);
      setText("emergency-115", t.emergency115);
      setText("taxi-title", t.taxiTitle);
      setText("taxi-value", PROPERTY.usefulNumbers.taxiDisplay);
      setText("taxi-note", t.taxiNote);
      const taxiBtn = document.getElementById("taxi-call-btn");
      taxiBtn.textContent = t.taxiCallBtn;
      taxiBtn.href = PROPERTY.usefulNumbers.taxiHref;
      const uberBtn = document.getElementById("uber-btn");
      uberBtn.textContent = t.uberBtn;
      uberBtn.href = PROPERTY.usefulNumbers.uberHref;
      const bTaxiBtn = document.getElementById("btaxi-btn");
      bTaxiBtn.textContent = t.bTaxiBtn;
      bTaxiBtn.href = PROPERTY.usefulNumbers.bTaxiHref;

      setText("explore-title", t.exploreTitle);
      setText("explore-text", t.exploreText);
      setText("discover-btn", t.discoverBtn);
      setText("events-btn", t.eventsBtn);
      setText("ecosystem-kicker", t.ecosystemKicker);
      setText("ecosystem-title", t.ecosystemTitle);
      setText("ecosystem-text", t.ecosystemText);
      setText("ecosystem-btn", t.ecosystemBtn);

      document.getElementById("map-btn").textContent = t.mapBtn;
      document.getElementById("map-btn").href = PROPERTY.mapsUrl;
      document.getElementById("whatsapp-btn").textContent = t.whatsappBtn;
      document.getElementById("whatsapp-btn").href = PROPERTY.whatsappUrl;

      const hasDocs = [
        setButton("rules-btn", t.rulesBtn, getDocumentForLang(PROPERTY.documents.rules, lang)),
        setButton("arrival-btn", t.arrivalBtn, getDocumentForLang(PROPERTY.documents.arrival, lang)),
        setButton("pet-btn", t.petBtn, getDocumentForLang(PROPERTY.documents.pet, lang)),
        setButton("extra-btn", t.extraBtn, getDocumentForLang(PROPERTY.documents.extra, lang))
      ].some(Boolean);

      document.getElementById("docs-grid").classList.toggle("hidden", !hasDocs);

      document.querySelectorAll(".lang-btn").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.lang === lang);
      });

      updateAccordionTitles(t);
    }

    const coverImage = document.getElementById("cover-image");
    const coverFallback = document.getElementById("cover-fallback");
    coverImage.onload = () => {
      coverImage.classList.remove("hidden");
      coverFallback.classList.add("hidden");
    };
    coverImage.onerror = () => {
      coverImage.classList.add("hidden");
      coverFallback.classList.remove("hidden");
    };

    if (coverImage.complete && coverImage.naturalWidth > 0) {
      coverImage.classList.remove("hidden");
      coverFallback.classList.add("hidden");
    } else {
      coverImage.src = PROPERTY.coverImage;
    }

    document.querySelectorAll(".lang-btn").forEach((btn) => {
      btn.addEventListener("click", () => render(btn.dataset.lang));
    });

    initAccordions();
    render("it");
  </script>
